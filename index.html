<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noroeste Paranaense | Portal de Notícias</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <img src="posts/27317.jpg" alt="Logo" class="logo">
    </header>

    <nav class="main-nav">
        <div class="nav-container-top">
            <div class="menu-container-mobile" onclick="toggleMenu()">
                <div class="hamburger"><span></span><span></span><span></span></div>
                <span class="menu-label">MENU</span>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Pesquisar...">
                <button><i class="fas fa-search"></i></button>
            </div>
        </div>
        
        <div class="tv-ticker">
            <div class="ticker-content" id="ticker-values">
                </div>
        </div>

        <ul class="nav-links" id="nav-links">
            <li><a href="#noticias" onclick="toggleMenu()">Notícias</a></li>
            <li><a href="#economia" onclick="toggleMenu()">Economia</a></li>
            <li><a href="#agro" onclick="toggleMenu()">Agro</a></li>
            <li><a href="#clima" onclick="toggleMenu()">Clima</a></li>
        </ul>
    </nav>

    <main class="content-wrapper">
        
        <section id="noticias" class="info-block">
            <h3 class="title-section"><i class="fas fa-bolt"></i> Últimas Notícias</h3>
            <div id="news-container" class="uniform-grid">
                <p>Carregando notícias...</p>
            </div>
        </section>

        <section id="economia" class="info-block">
            <div class="market-container">
                <div class="market-main-card">
                    <canvas id="ibovChart"></canvas>
                </div>
                <div class="converter-card">
                    <h4>Conversor</h4>
                    <input type="number" id="inputValue" placeholder="Valor R$" oninput="convertCurrency()">
                    <select id="currencySelect" onchange="convertCurrency()">
                        <option value="4.96">Dólar (USD)</option>
                        <option value="5.38">Euro (EUR)</option>
                    </select>
                    <div id="resultValue" class="result-box">Resultado: $ 0,00</div>
                </div>
            </div>
        </section>

    </main>

    <a href="https://wa.me/5544988329395" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function toggleMenu() { document.getElementById('nav-links').classList.toggle('show'); }

        // Notícias Automáticas
        async function fetchNews() {
            const container = document.getElementById('news-container');
            const rssUrl = 'https://api.rss2json.com/v1/api.json?rss_url=https://g1.globo.com/rss/g1/economia/';
            try {
                const response = await fetch(rssUrl);
                const data = await response.json();
                container.innerHTML = data.items.slice(0, 4).map(item => `
                    <div class="auto-news-card uniform-card">
                        <img src="${item.thumbnail || 'posts/27317.jpg'}" class="news-thumb">
                        <div class="news-info">
                            <h4>${item.title}</h4>
                            <a href="${item.link}" target="_blank">Ver mais</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) { container.innerHTML = "<p>Erro ao carregar notícias.</p>"; }
        }

        // Ticker de TV
        const ticker = document.getElementById('ticker-values');
        const infoAgro = ["DÓLAR: R$ 4,96", "SOJA: R$ 134,50", "MILHO: R$ 62,20", "IBOVESPA: +0.42%", "BOI: R$ 232,00"];
        // Duplicamos para o efeito infinito
        const textoTicker = infoAgro.join(' • ') + ' • ';
        ticker.innerHTML = `<span>${textoTicker}</span><span>${textoTicker}</span>`;

        // Gráfico
        new Chart(document.getElementById('ibovChart'), {
            type: 'line',
            data: {
                labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex'],
                datasets: [{ label: 'Ibov', data: [126, 127, 126, 128, 128.4], borderColor: '#2ecc71', fill: false }]
            },
            options: { maintainAspectRatio: false }
        });

        window.onload = fetchNews;
    </script>
</body>
</html>
