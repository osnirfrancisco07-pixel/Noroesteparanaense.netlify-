backend:
  name: git-gateway
  branch: main

media_folder: "imagens"
public_folder: "/imagens"

collections:
  - name: "noticias"
    label: "Notícias"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Categoria", name: "category", widget: "select", options: ["Eventos", "Notícias", "Utilidade Pública", "Vagas de Emprego", "Serviços", "Humor", "Horóscopo", "Resumo de Novelas"] }
      - { label: "Conteúdo", name: "body", widget: "markdown" }
